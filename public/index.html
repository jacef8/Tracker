<script>
  // Simplified join logic for passcode integration
  document.getElementById('join-btn').onclick = async () => {
    const name = document.getElementById('inp-name').value.trim();
    const group = document.getElementById('inp-group').value.trim();
    if (!name || !group) return toast('Name and Group required');
    if (group === '777') { window.location.href = '/777'; return; }
    
    // Passcode check
    const uid = genUid();
    checkGroupPasscode(name, group, uid);
  };

  async function checkGroupPasscode(name, group, uid) {
    const { db, ref, onValue } = window._fb;
    onValue(ref(db, 'gl/' + group + '/config/pin'), (snap) => {
      const storedHash = snap.val();
      if (!storedHash) {
        enterMap(name, group, uid);
      } else {
        // Here you would trigger your passcode modal from your original file
        const pin = prompt("Enter 4-digit passcode:");
        crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin)).then(buf => {
          const hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
          if (hash === storedHash) enterMap(name, group, uid);
          else toast('Incorrect passcode');
        });
      }
    }, { onlyOnce: true });
  }

  function enterMap(name, group, uid) {
    userName = name; groupName = group; userId = uid;
    document.getElementById('join-screen').style.display = 'none';
    document.getElementById('topbar').style.display = 'flex';
    document.getElementById('group-name-label').textContent = group;
    // ... initialize Map, Listeners, etc ...
  }
  function genUid() { return Date.now().toString(36) + Math.random().toString(36).substring(2, 7); }
  function toast(m) { alert(m); }
</script>
