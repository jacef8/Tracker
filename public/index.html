<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0d1117" />
<title>GroundLink</title>
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<!-- [Include your Firebase/Mapbox script here] -->
<style>
  /* [Keep your CSS from the previous block] */
  #locate-me.following { border-color: #39ff8a !important; background: rgba(57, 255, 138, 0.1); }
</style>
</head>
<body>
<!-- [Keep your existing HTML structure] -->
<script>
  let followMode = false;

  // FIX: Force followMode to toggle correctly and pan map
  document.getElementById('locate-me').addEventListener('click', () => {
    followMode = !followMode;
    const btn = document.getElementById('locate-me');
    btn.classList.toggle('following', followMode);
    
    if (followMode && window._lastGPS) {
      map.flyTo({ center: [window._lastGPS.lng, window._lastGPS.lat], zoom: 17 });
    }
  });

  // FIX: Update startLocationSharing to respect followMode
  function startLocationSharing() {
    navigator.geolocation.watchPosition(pos => {
      const { latitude: lat, longitude: lng, accuracy } = pos.coords;
      window._lastGPS = { lat, lng };
      
      // Update database... [Keep existing logic]

      // FOLLOW MODE: If enabled, always pan to current location
      if (followMode && window._mapReady && !map.isMoving()) {
        map.panTo([lng, lat]);
      }
    }, null, { enableHighAccuracy: true, maximumAge: 0 });
  }
</script>
</body>
</html>
