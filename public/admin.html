<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>GroundLink Admin</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  const app = initializeApp({/* same config */});
  window._fb = { db: getDatabase(app), ref, onValue };
</script>
<style>
  body { background: #0d1117; color: #fff; font-family: sans-serif; padding: 20px; }
  pre { background: #161b22; padding: 15px; overflow-x: auto; font-size: 11px; }
</style>
</head>
<body>
  <h1>Global Data Inspector</h1>
  <button onclick="loadGlobalData()">Refresh All Data</button>
  <pre id="output">Data will appear here...</pre>

  <script>
    function loadGlobalData() {
      const { db, ref, onValue } = window._fb;
      onValue(ref(db, 'gl'), (snap) => {
        document.getElementById('output').textContent = JSON.stringify(snap.val(), null, 2);
      }, { onlyOnce: true });
    }
  </script>
</body>
</html>
