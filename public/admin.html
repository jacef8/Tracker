<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>GroundLink Admin</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, remove }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyCD_6FEd8wJQszvE1DVAZtko1smZVlhCpk",
    authDomain:        "tracker-58b87.firebaseapp.com",
    databaseURL:       "https://tracker-58b87-default-rtdb.firebaseio.com",
    projectId:         "tracker-58b87",
    storageBucket:     "tracker-58b87.firebasestorage.app",
    messagingSenderId: "371034128407",
    appId:             "1:371034128407:web:31259f67dc2d36d91cdc52",
    measurementId:     "G-EH3FZ2CZWJ"
  };
  const app = initializeApp(firebaseConfig);
  window._fb = { db: getDatabase(app), ref, onValue, remove };
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --accent: #f0a500; --text: #e6edf3; --muted: #8b949e;
    --danger: #f85149; --green: #3fb950; --yellow: #e3b341; --blue: #58a6ff;
    font-family: system-ui, sans-serif; font-size: 14px; color: var(--text);
  }
  body { background: var(--bg); padding: 16px; min-height: 100vh; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .header h1 { font-size: 18px; font-weight: 700; color: var(--accent); }
  .header .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .back-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 7px 14px; color: var(--text); font-size: 13px; cursor: pointer; text-decoration: none; }

  /* Tab nav */
  .tab-nav { display: flex; gap: 4px; margin-bottom: 16px; background: var(--surface); border-radius: 10px; padding: 4px; }
  .tab-btn { flex: 1; padding: 8px; border: none; border-radius: 8px; background: transparent; color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; }
  .tab-btn.active { background: var(--bg); color: var(--text); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Stats */
  .stats-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; flex: 1; min-width: 80px; }
  .stat-val { font-size: 22px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* Group cards */
  #admin-list { display: flex; flex-direction: column; gap: 12px; }
  .group-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
  .group-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; gap: 10px; }
  .group-name { font-size: 15px; font-weight: 700; }
  .group-key { font-size: 10px; color: var(--muted); font-family: monospace; margin-top: 2px; }
  .live-badge { background: rgba(63,185,80,.15); border: 1px solid var(--green); border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 700; color: var(--green); white-space: nowrap; flex-shrink: 0; }
  .dead-badge { background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 2px 10px; font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
  .group-meta { display: flex; gap: 12px; flex-wrap: wrap; font-size: 12px; color: var(--muted); margin-bottom: 12px; }
  .user-list { background: var(--bg); border-radius: 8px; padding: 8px 10px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 4px; }
  .user-row { display: flex; align-items: center; justify-content: space-between; font-size: 12px; gap: 8px; }
  .user-name { font-weight: 600; min-width: 60px; }
  .user-ts { color: var(--muted); font-size: 11px; flex: 1; }
  .user-live { color: var(--green); font-size: 10px; font-weight: 700; }
  .user-stale { color: var(--danger); font-size: 10px; font-weight: 700; }
  .user-warn { color: var(--yellow); font-size: 10px; font-weight: 700; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn { padding: 7px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; transition: opacity .15s; }
  .btn:active { opacity: .7; }
  .btn-danger { background: rgba(248,81,73,.12); border: 1px solid var(--danger); color: var(--danger); }
  .btn-warn { background: var(--bg); border: 1px solid var(--border); color: var(--text); }
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }
  .loading { text-align: center; padding: 40px 20px; color: var(--muted); }

  /* Debug panel */
  #debug-panel { display: flex; flex-direction: column; gap: 12px; }
  .debug-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
  .debug-title { font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
  .debug-row { display: grid; grid-template-columns: 140px 1fr auto; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); align-items: start; font-size: 12px; }
  .debug-row:last-child { border-bottom: none; }
  .debug-label { color: var(--muted); font-weight: 600; }
  .debug-val { color: var(--text); font-family: monospace; word-break: break-all; }
  .debug-status { font-size: 10px; font-weight: 700; white-space: nowrap; }
  .status-ok { color: var(--green); }
  .status-warn { color: var(--yellow); }
  .status-dead { color: var(--danger); }

  /* Event log */
  #event-log { display: flex; flex-direction: column; gap: 3px; max-height: 320px; overflow-y: auto; }
  .log-entry { font-size: 11px; font-family: monospace; padding: 4px 8px; border-radius: 4px; background: var(--bg); display: flex; gap: 8px; }
  .log-time { color: var(--muted); flex-shrink: 0; }
  .log-msg { color: var(--text); }
  .log-ok  { border-left: 3px solid var(--green); }
  .log-warn { border-left: 3px solid var(--yellow); }
  .log-dead { border-left: 3px solid var(--danger); }
  .log-info { border-left: 3px solid var(--blue); }

  .copy-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; color: var(--muted); font-size: 11px; cursor: pointer; }
  .copy-btn:active { color: var(--accent); border-color: var(--accent); }

  .refresh-badge { background: var(--green); border-radius: 20px; padding: 1px 8px; font-size: 10px; color: #000; font-weight: 700; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>GroundLink Admin</h1>
    <div class="sub" id="last-refresh">Connecting…</div>
  </div>
  <a href="/" class="back-btn">&#8592; App</a>
</div>

<div class="stats-row">
  <div class="stat-card"><div class="stat-val" id="stat-groups">—</div><div class="stat-label">Groups</div></div>
  <div class="stat-card"><div class="stat-val" id="stat-users">—</div><div class="stat-label">Live Now</div></div>
  <div class="stat-card"><div class="stat-val" id="stat-pins">—</div><div class="stat-label">Pins</div></div>
  <div class="stat-card"><div class="stat-val" id="stat-chats">—</div><div class="stat-label">Messages</div></div>
</div>

<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('groups')">Groups</button>
  <button class="tab-btn" onclick="switchTab('debug')">&#128203; Debug</button>
</div>

<!-- GROUPS TAB -->
<div class="tab-panel active" id="tab-groups">
  <div id="admin-list"><div class="loading">Connecting to Firebase…</div></div>
</div>

<!-- DEBUG TAB -->
<div class="tab-panel" id="tab-debug">
  <div id="debug-panel">

    <div class="debug-section">
      <div class="debug-title">
        Live Device Monitor
        <span class="refresh-badge" id="refresh-badge">LIVE</span>
      </div>
      <div id="device-monitor"><div class="loading" style="padding:20px 0">Waiting for data…</div></div>
    </div>

    <div class="debug-section">
      <div class="debug-title">
        Stale Threshold Analysis
        <span style="font-size:11px;color:var(--muted);font-weight:400">App drops users after 90s</span>
      </div>
      <div id="stale-analysis"><div style="color:var(--muted);font-size:12px">Waiting for data…</div></div>
    </div>

    <div class="debug-section">
      <div class="debug-title">
        Event Log
        <button class="copy-btn" onclick="copyLog()">Copy Log</button>
      </div>
      <div id="event-log"></div>
    </div>

  </div>
</div>

<script>
var LIVE_MS  = 90 * 1000;
var WARN_MS  = 60 * 1000;
var eventLog = [];
var prevSnapshot = {};

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(function(b,i) {
    b.classList.toggle('active', ['groups','debug'][i] === name);
  });
  document.querySelectorAll('.tab-panel').forEach(function(p) {
    p.classList.toggle('active', p.id === 'tab-' + name);
  });
}

function timeAgo(ts) {
  if (!ts) return 'never';
  var s = Math.floor((Date.now() - ts) / 1000);
  if (s < 5)  return 'just now';
  if (s < 60) return s + 's ago';
  var m = Math.floor(s / 60);
  if (m < 60) return m + 'm ago';
  return Math.floor(m/60) + 'h ago';
}

function tsStr(ts) {
  if (!ts) return '—';
  var d = new Date(ts);
  return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

function addLog(msg, type) {
  type = type || 'info';
  var now = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  eventLog.unshift({ t: now, msg: msg, type: type });
  if (eventLog.length > 100) eventLog.pop();
  renderLog();
}

function renderLog() {
  var el = document.getElementById('event-log');
  if (!el) return;
  el.innerHTML = eventLog.slice(0, 50).map(function(e) {
    return '<div class="log-entry log-' + e.type + '"><span class="log-time">' + e.t + '</span><span class="log-msg">' + e.msg + '</span></div>';
  }).join('');
}

function copyLog() {
  var text = eventLog.map(function(e) { return '[' + e.t + '] ' + e.msg; }).join('\n');
  navigator.clipboard.writeText(text).then(function() {
    var btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(function() { btn.textContent = 'Copy Log'; }, 1500);
  });
}

window.deleteNode = function(path, label) {
  if (confirm('Delete ' + label + '?\nPath: ' + path + '\n\nCannot be undone.')) {
    window._fb.remove(window._fb.ref(window._fb.db, path));
    addLog('DELETED: ' + path, 'warn');
  }
};

function renderDeviceMonitor(all, now) {
  var el = document.getElementById('device-monitor');
  var staleEl = document.getElementById('stale-analysis');
  if (!el) return;

  var rows = '';
  var staleRows = '';
  var anyUsers = false;

  Object.entries(all).forEach(function(entry) {
    var groupKey = entry[0];
    var group = entry[1];
    if (!group.users) return;

    Object.entries(group.users).forEach(function(ue) {
      var uid = ue[0];
      var u   = ue[1];
      anyUsers = true;
      var age = now - (u.ts || 0);
      var ageSec = Math.floor(age / 1000);
      var statusClass, statusText;

      if (age < WARN_MS) {
        statusClass = 'status-ok'; statusText = 'OK (' + ageSec + 's)';
      } else if (age < LIVE_MS) {
        statusClass = 'status-warn'; statusText = 'WARN (' + ageSec + 's)';
      } else {
        statusClass = 'status-dead'; statusText = 'STALE (' + ageSec + 's)';
      }

      var coord = u.lat ? u.lat.toFixed(4) + ', ' + u.lng.toFixed(4) : 'no GPS';
      var acc   = u.accuracy ? '±' + u.accuracy + 'ft' : '—';

      rows +=
        '<div class="debug-row">' +
          '<div class="debug-label">' + (u.name || uid.slice(0,8)) + '<br><span style="font-size:10px;color:var(--muted)">' + groupKey + '</span></div>' +
          '<div class="debug-val">' +
            'Last: ' + tsStr(u.ts) + '<br>' +
            'Pos: ' + coord + '<br>' +
            'Acc: ' + acc +
          '</div>' +
          '<div class="debug-status ' + statusClass + '">' + statusText + '</div>' +
        '</div>';

      // Stale analysis
      var pct = Math.min(100, Math.round(age / LIVE_MS * 100));
      var barColor = age < WARN_MS ? '#3fb950' : age < LIVE_MS ? '#e3b341' : '#f85149';
      staleRows +=
        '<div style="margin-bottom:10px">' +
          '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">' +
            '<span><strong>' + (u.name||uid.slice(0,8)) + '</strong> in ' + groupKey + '</span>' +
            '<span style="color:' + barColor + ';font-weight:700">' + ageSec + 's / 90s limit</span>' +
          '</div>' +
          '<div style="height:6px;background:var(--border);border-radius:3px">' +
            '<div style="height:100%;width:' + pct + '%;background:' + barColor + ';border-radius:3px;transition:width .5s"></div>' +
          '</div>' +
        '</div>';
    });
  });

  el.innerHTML = anyUsers ? rows : '<div style="color:var(--muted);font-size:12px;padding:8px 0">No users in any group right now.</div>';
  staleEl.innerHTML = anyUsers ? staleRows : '<div style="color:var(--muted);font-size:12px">No users to analyze.</div>';
}

function detectChanges(all, now) {
  // Detect joins, leaves, GPS gaps
  Object.entries(all).forEach(function(entry) {
    var gk = entry[0];
    var group = entry[1];
    if (!group.users) return;

    Object.entries(group.users).forEach(function(ue) {
      var uid  = ue[0];
      var u    = ue[1];
      var key  = gk + '/' + uid;
      var prev = prevSnapshot[key];
      var name = u.name || uid.slice(0,8);
      var age  = now - (u.ts || 0);

      if (!prev) {
        // New user appeared
        addLog(name + ' appeared in ' + gk, 'ok');
      } else {
        // Check GPS update gap
        var gap = (u.ts || 0) - (prev.ts || 0);
        if (gap > 0 && gap > 15000) {
          addLog(name + ' GPS gap: ' + Math.round(gap/1000) + 's (expected ~3-5s)', 'warn');
        }
        // Check going stale
        if (age > LIVE_MS && (now - (prev.ts||0)) < LIVE_MS) {
          addLog(name + ' went STALE — will be hidden from map', 'dead');
        }
      }
      prevSnapshot[key] = { ts: u.ts };
    });
  });

  // Detect departed users
  Object.keys(prevSnapshot).forEach(function(key) {
    var parts = key.split('/');
    var gk = parts[0], uid = parts[1];
    if (!all[gk] || !all[gk].users || !all[gk].users[uid]) {
      addLog((prevSnapshot[key].name || uid.slice(0,8)) + ' removed from ' + gk, 'warn');
      delete prevSnapshot[key];
    }
  });
}

function loadAdmin() {
  var t = setInterval(function() {
    if (!window._fb) return;
    clearInterval(t);

    var fb = window._fb;
    addLog('Connected to Firebase', 'ok');

    fb.onValue(fb.ref(fb.db, 'gl'), function(snap) {
      var all = snap.val() || {};
      var now = Date.now();

      document.getElementById('last-refresh').textContent =
        'Last update: ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});

      detectChanges(all, now);
      renderDeviceMonitor(all, now);

      // --- GROUPS TAB ---
      var container = document.getElementById('admin-list');
      var STALE_24H = 24 * 60 * 60 * 1000;
      var totalGroups=0, totalLive=0, totalPins=0, totalChats=0;

      var entries = Object.entries(all).sort(function(a,b) { return a[0].localeCompare(b[0]); });

      if (!entries.length) {
        container.innerHTML = '<div class="empty">No groups in database.</div>';
        document.getElementById('stat-groups').textContent = '0';
        document.getElementById('stat-users').textContent  = '0';
        document.getElementById('stat-pins').textContent   = '0';
        document.getElementById('stat-chats').textContent  = '0';
        return;
      }

      container.innerHTML = '';

      entries.forEach(function(entry) {
        var key = entry[0], group = entry[1];
        totalGroups++;

        var users  = group.users  ? Object.entries(group.users)  : [];
        var pins   = group.pins   ? Object.keys(group.pins)       : [];
        var chats  = group.chat   ? Object.keys(group.chat)       : [];
        var trails = group.trails ? Object.keys(group.trails)     : [];

        var liveUsers = users.filter(function(u) { return (now-(u[1].ts||0)) < LIVE_MS; });
        totalLive  += liveUsers.length;
        totalPins  += pins.length;
        totalChats += chats.length;

        var lastActive = 0;
        users.forEach(function(u) { if ((u[1].ts||0) > lastActive) lastActive = u[1].ts; });
        if (group.pins) Object.values(group.pins).forEach(function(p) { if ((p.ts||0) > lastActive) lastActive = p.ts; });

        var displayName = key.replace(/_/g,' ').replace(/\b\w/g, function(c){return c.toUpperCase();});

        var userRowsHTML = '';
        if (users.length) {
          userRowsHTML = '<div class="user-list">';
          users.forEach(function(ue) {
            var uid=ue[0], d=ue[1];
            var age = now-(d.ts||0);
            var cls = age < WARN_MS ? 'user-live' : age < LIVE_MS ? 'user-warn' : 'user-stale';
            var lbl = age < WARN_MS ? 'LIVE' : age < LIVE_MS ? 'SLOWING' : 'STALE';
            userRowsHTML +=
              '<div class="user-row">' +
                '<span class="user-name">' + (d.name||uid.slice(0,8)) + '</span>' +
                '<span class="user-ts">' + tsStr(d.ts) + ' (' + timeAgo(d.ts) + ')</span>' +
                '<span class="' + cls + '">' + lbl + '</span>' +
              '</div>';
          });
          userRowsHTML += '</div>';
        }

        var card = document.createElement('div');
        card.className = 'group-card';
        card.innerHTML =
          '<div class="group-header">' +
            '<div><div class="group-name">' + displayName + '</div><div class="group-key">' + key + '</div></div>' +
            '<span class="' + (liveUsers.length ? 'live-badge' : 'dead-badge') + '">' +
              (liveUsers.length ? liveUsers.length + ' LIVE' : 'Empty') + '</span>' +
          '</div>' +
          '<div class="group-meta">' +
            '<span>&#128101; ' + users.length + ' user' + (users.length!==1?'s':'') + '</span>' +
            '<span>&#128205; ' + pins.length + ' pin' + (pins.length!==1?'s':'') + '</span>' +
            '<span>&#128172; ' + chats.length + ' msg' + (chats.length!==1?'s':'') + '</span>' +
            '<span>&#128062; ' + trails.length + ' trail' + (trails.length!==1?'s':'') + '</span>' +
            '<span>&#128336; ' + timeAgo(lastActive) + '</span>' +
          '</div>' +
          userRowsHTML +
          '<div class="btn-row">' +
            '<button class="btn btn-warn" onclick="deleteNode(\'gl/'+key+'/pins\',\'pins for '+displayName+'\')">Clear Pins</button>' +
            '<button class="btn btn-warn" onclick="deleteNode(\'gl/'+key+'/chat\',\'chat for '+displayName+'\')">Clear Chat</button>' +
            '<button class="btn btn-warn" onclick="deleteNode(\'gl/'+key+'/trails\',\'trails for '+displayName+'\')">Clear Trails</button>' +
            '<button class="btn btn-danger" onclick="deleteNode(\'gl/'+key+'\',\'group '+displayName+'\')">Nuke Room</button>' +
          '</div>';
        container.appendChild(card);
      });

      document.getElementById('stat-groups').textContent = totalGroups;
      document.getElementById('stat-users').textContent  = totalLive;
      document.getElementById('stat-pins').textContent   = totalPins;
      document.getElementById('stat-chats').textContent  = totalChats;
    });

    // Refresh device monitor every 5 seconds even without Firebase event
    setInterval(function() {
      var fb2 = window._fb;
      fb2.onValue(fb2.ref(fb2.db, 'gl'), function(snap) {
        renderDeviceMonitor(snap.val() || {}, Date.now());
      }, { onlyOnce: true });
    }, 5000);

  }, 50);
}

loadAdmin();
</script>
</body>
</html>
