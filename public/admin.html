<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>GroundLink Admin</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, remove }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyCD_6FEd8wJQszvE1DVAZtko1smZVlhCpk",
    authDomain:        "tracker-58b87.firebaseapp.com",
    databaseURL:       "https://tracker-58b87-default-rtdb.firebaseio.com",
    projectId:         "tracker-58b87",
    storageBucket:     "tracker-58b87.firebasestorage.app",
    messagingSenderId: "371034128407",
    appId:             "1:371034128407:web:31259f67dc2d36d91cdc52",
    measurementId:     "G-EH3FZ2CZWJ"
  };

  const app = initializeApp(firebaseConfig);
  window._fb = { db: getDatabase(app), ref, onValue, remove };
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --accent: #f0a500; --text: #e6edf3; --muted: #8b949e;
    --danger: #f85149; --green: #3fb950;
    font-family: system-ui, sans-serif; font-size: 14px; color: var(--text);
  }
  body { background: var(--bg); padding: 16px; min-height: 100vh; }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .header h1 { font-size: 18px; font-weight: 700; color: var(--accent); }
  .header .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .back-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 14px; color: var(--text);
    font-size: 13px; cursor: pointer; text-decoration: none;
  }

  .stats-row {
    display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px; flex: 1; min-width: 100px;
  }
  .stat-val { font-size: 24px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

  #admin-list { display: flex; flex-direction: column; gap: 12px; }

  .group-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
  }
  .group-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 10px; gap: 10px;
  }
  .group-name {
    font-size: 15px; font-weight: 700; color: var(--text);
    text-transform: capitalize;
  }
  .group-key { font-size: 10px; color: var(--muted); font-family: monospace; margin-top: 2px; }
  .live-badge {
    background: rgba(63,185,80,.15); border: 1px solid var(--green);
    border-radius: 20px; padding: 2px 10px;
    font-size: 11px; font-weight: 700; color: var(--green);
    white-space: nowrap; flex-shrink: 0;
  }
  .dead-badge {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 2px 10px;
    font-size: 11px; color: var(--muted);
    white-space: nowrap; flex-shrink: 0;
  }

  .group-meta {
    display: flex; gap: 14px; flex-wrap: wrap;
    font-size: 12px; color: var(--muted); margin-bottom: 12px;
  }
  .group-meta span { display: flex; align-items: center; gap: 4px; }

  .user-list {
    background: var(--bg); border-radius: 8px; padding: 8px 10px;
    margin-bottom: 12px; display: flex; flex-direction: column; gap: 4px;
  }
  .user-row {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px;
  }
  .user-name { font-weight: 600; }
  .user-ts { color: var(--muted); font-size: 11px; }
  .user-live { color: var(--green); font-size: 10px; font-weight: 700; }
  .user-stale { color: var(--muted); font-size: 10px; }

  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    padding: 7px 12px; border-radius: 8px; font-size: 12px;
    font-weight: 700; cursor: pointer; border: none; transition: opacity .15s;
  }
  .btn:hover { opacity: .8; }
  .btn-danger {
    background: rgba(248,81,73,.12); border: 1px solid var(--danger);
    color: var(--danger);
  }
  .btn-warn {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
  }
  .btn-accent {
    background: rgba(240,165,0,.12); border: 1px solid var(--accent);
    color: var(--accent);
  }

  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }
  .loading { text-align: center; padding: 40px 20px; color: var(--muted); }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>GroundLink Admin</h1>
    <div class="sub">Firebase: tracker-58b87</div>
  </div>
  <a href="/" class="back-btn">← Back to App</a>
</div>

<div class="stats-row">
  <div class="stat-card"><div class="stat-val" id="stat-groups">—</div><div class="stat-label">Total Groups</div></div>
  <div class="stat-card"><div class="stat-val" id="stat-users">—</div><div class="stat-label">Live Users</div></div>
  <div class="stat-card"><div class="stat-val" id="stat-pins">—</div><div class="stat-label">Total Pins</div></div>
  <div class="stat-card"><div class="stat-val" id="stat-chats">—</div><div class="stat-label">Chat Messages</div></div>
</div>

<div id="admin-list"><div class="loading">Connecting to Firebase…</div></div>

<script>
function timeAgo(ts) {
  if (!ts) return 'never';
  var diff = Date.now() - ts;
  var m = Math.floor(diff / 60000);
  var h = Math.floor(diff / 3600000);
  var d = Math.floor(diff / 86400000);
  if (m < 1)  return 'just now';
  if (m < 60) return m + 'm ago';
  if (h < 24) return h + 'h ago';
  return d + 'd ago';
}

window.deleteNode = function(path, label) {
  if (confirm('Delete ' + label + '?\n\nPath: ' + path + '\n\nThis cannot be undone.')) {
    window._fb.remove(window._fb.ref(window._fb.db, path));
  }
};

function loadAdmin() {
  var t = setInterval(function() {
    if (!window._fb) return;
    clearInterval(t);

    var fb = window._fb;
    fb.onValue(fb.ref(fb.db, 'gl'), function(snap) {
      var all = snap.val() || {};
      var container = document.getElementById('admin-list');
      var now = Date.now();
      var LIVE_MS = 90 * 1000;

      var totalGroups = 0, totalLive = 0, totalPins = 0, totalChats = 0;

      var entries = Object.entries(all).sort(function(a, b) {
        return a[0].localeCompare(b[0]);
      });

      if (entries.length === 0) {
        container.innerHTML = '<div class="empty">No groups in database.</div>';
        return;
      }

      container.innerHTML = '';

      entries.forEach(function(entry) {
        var key   = entry[0];
        var group = entry[1];
        totalGroups++;

        var users    = group.users   ? Object.entries(group.users)   : [];
        var pins     = group.pins    ? Object.keys(group.pins)        : [];
        var chats    = group.chat    ? Object.keys(group.chat)        : [];
        var trails   = group.trails  ? Object.keys(group.trails)      : [];

        var liveUsers  = users.filter(function(u) { return (now - (u[1].ts || 0)) < LIVE_MS; });
        totalLive     += liveUsers.length;
        totalPins     += pins.length;
        totalChats    += chats.length;

        // Find last activity
        var lastActive = 0;
        users.forEach(function(u) { if ((u[1].ts || 0) > lastActive) lastActive = u[1].ts; });
        if (group.pins) Object.values(group.pins).forEach(function(p) { if ((p.ts||0) > lastActive) lastActive = p.ts; });

        var displayName = key.replace(/_/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });

        var card = document.createElement('div');
        card.className = 'group-card';

        // User rows HTML
        var userRowsHTML = '';
        if (users.length > 0) {
          userRowsHTML = '<div class="user-list">';
          users.forEach(function(u) {
            var uid  = u[0];
            var data = u[1];
            var isLive = (now - (data.ts || 0)) < LIVE_MS;
            userRowsHTML +=
              '<div class="user-row">' +
                '<span class="user-name">' + (data.name || uid.slice(0,8)) + '</span>' +
                '<span class="user-ts">' + timeAgo(data.ts) + '</span>' +
                '<span class="' + (isLive ? 'user-live' : 'user-stale') + '">' +
                  (isLive ? 'LIVE' : 'AWAY') +
                '</span>' +
              '</div>';
          });
          userRowsHTML += '</div>';
        }

        card.innerHTML =
          '<div class="group-header">' +
            '<div>' +
              '<div class="group-name">' + displayName + '</div>' +
              '<div class="group-key">' + key + '</div>' +
            '</div>' +
            '<span class="' + (liveUsers.length > 0 ? 'live-badge' : 'dead-badge') + '">' +
              (liveUsers.length > 0 ? liveUsers.length + ' LIVE' : 'Empty') +
            '</span>' +
          '</div>' +
          '<div class="group-meta">' +
            '<span>👥 ' + users.length + ' user' + (users.length !== 1 ? 's' : '') + '</span>' +
            '<span>📍 ' + pins.length + ' pin' + (pins.length !== 1 ? 's' : '') + '</span>' +
            '<span>💬 ' + chats.length + ' msg' + (chats.length !== 1 ? 's' : '') + '</span>' +
            '<span>🐾 ' + trails.length + ' trail' + (trails.length !== 1 ? 's' : '') + '</span>' +
            '<span>🕐 ' + timeAgo(lastActive) + '</span>' +
          '</div>' +
          userRowsHTML +
          '<div class="btn-row">' +
            '<button class="btn btn-warn" onclick="deleteNode(\'gl/' + key + '/pins\',\'pins for ' + displayName + '\')">Clear Pins</button>' +
            '<button class="btn btn-warn" onclick="deleteNode(\'gl/' + key + '/chat\',\'chat for ' + displayName + '\')">Clear Chat</button>' +
            '<button class="btn btn-warn" onclick="deleteNode(\'gl/' + key + '/trails\',\'trails for ' + displayName + '\')">Clear Trails</button>' +
            '<button class="btn btn-danger" onclick="deleteNode(\'gl/' + key + '\',\'entire group: ' + displayName + '\')">Nuke Room</button>' +
          '</div>';

        container.appendChild(card);
      });

      // Update stats
      document.getElementById('stat-groups').textContent = totalGroups;
      document.getElementById('stat-users').textContent  = totalLive;
      document.getElementById('stat-pins').textContent   = totalPins;
      document.getElementById('stat-chats').textContent  = totalChats;
    });
  }, 50);
}

loadAdmin();
</script>
</body>
</html>
