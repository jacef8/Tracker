<!DOCTYPE html>
<html lang="en">
<head>
<!-- ... (Keep your original code from admin_3.html here) ... -->
</head>
<body>

<!-- ... (Keep all existing admin design elements) ... -->

<!-- ADD THIS TAB AND PANEL TO THE HTML BODY -->
<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('groups')">Groups</button>
  <button class="tab-btn" onclick="switchTab('debug')">Debug</button>
  <button class="tab-btn" onclick="switchTab('data')">Data Inspector</button>
</div>

<div class="tab-panel" id="tab-data">
  <div class="debug-section">
    <div class="debug-title">Global Database State</div>
    <button onclick="loadGlobalData()">Refresh Data</button>
    <pre id="global-data-output" style="font-size:10px; color:var(--text); background:var(--bg); padding:10px; overflow-x:auto; max-height: 500px;"></pre>
  </div>
</div>

<script>
// ADD THIS TO YOUR ADMIN SCRIPT
function loadGlobalData() {
  window._fb.onValue(window._fb.ref(window._fb.db, 'gl'), (snap) => {
    document.getElementById('global-data-output').textContent = JSON.stringify(snap.val(), null, 2);
  }, { onlyOnce: true });
}

// Update switchTab function to include 'data'
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase().includes(name));
  });
  document.querySelectorAll('.tab-panel').forEach(p => {
    p.classList.toggle('active', p.id === 'tab-' + name);
  });
  if (name === 'data') loadGlobalData();
}
// ... (Rest of your original admin script remains as it was in admin_3.html) ...
</script>
</body>
</html>
